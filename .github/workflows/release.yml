name: Release

on:
  push:
    tags:
      - "v*-beta*"

permissions:
  contents: write

jobs:
  beta-release:
    name: Publish beta release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release assets
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Create GitHub prerelease
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          asset="dist/InvestTime-${TAG_NAME}-win64.zip"
          if [ ! -f "$asset" ]; then
            echo "Missing release asset: $asset" >&2
            exit 1
          fi

          gh release create "$TAG_NAME" "$asset#InvestTime-${TAG_NAME}-win64.zip" \
            --title "Beta Test $TAG_NAME" \
            --notes "Beta test release. Download the win64 zip package for the runnable app and required audio assets." \
            --prerelease \
            --verify-tag
